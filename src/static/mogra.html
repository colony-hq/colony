          Could not load agents. ${esc(agentsResult.reason?.message || 'Unknown error')}
        </td>
      </tr>
    `;
  }
}

  window.Pages = window.Pages || {};
  window.Pages['dashboard'] = { render: render };
})();


/* ======== app ======== */
/**
 * Colony HQ — Main App Entry
 * Wires the router, nav state, and page rendering together.
 */


// Page modules — lazy-imported on demand to keep initial load fast
const pages = {
  home: () => Promise.resolve(window.Pages.home),
  browse: () => Promise.resolve(window.Pages.browse),
  'agent-detail': () => Promise.resolve(window.Pages['agent-detail']),
  'agent-chat': () => Promise.resolve(window.Pages['agent-chat']),
  create: () => Promise.resolve(window.Pages.create),
  dashboard: () => Promise.resolve(window.Pages.dashboard),
};

const root = document.getElementById('app-root');

// ─── Route matching ──────────────────────────────────────────────────────────

function matchPath(hash) {
  const path = hash.replace(/^#/, '') || '/';
  const [pathname, qs = ''] = path.split('?');
  const query = Object.fromEntries(new URLSearchParams(qs));

  if (pathname === '/' || pathname === '') return { page: 'home', params: {}, query };
  if (pathname === '/browse') return { page: 'browse', params: {}, query };
  if (pathname === '/create') return { page: 'create', params: {}, query };
  if (pathname === '/dashboard') return { page: 'dashboard', params: {}, query };

  const agentChat = pathname.match(/^\/agents\/([^/]+)\/chat$/);
  if (agentChat) return { page: 'agent-chat', params: { id: agentChat[1] }, query };

  const agentDetail = pathname.match(/^\/agents\/([^/]+)$/);
  if (agentDetail) return { page: 'agent-detail', params: { id: agentDetail[1] }, query };

  return { page: 'home', params: {}, query };
}

// ─── Page loader ────────────────────────────────────────────────────────────

async function loadPage(route) {
  const loader = pages[route.page];
  if (!loader) {
    root.innerHTML = '<div class="page-error"><h1>PAGE NOT FOUND</h1><a href="#/" class="btn-primary">GO HOME</a></div>';
    return;
  }

  // Show loading skeleton
  root.innerHTML = '<div class="page-loading"><div class="spinner"></div></div>';
  root.className = `page page-${route.page}`;

  try {
    const mod = await loader();
    root.innerHTML = '';
    await mod.render(root, route.params, route.query);
    // Scroll to top on page change
    window.scrollTo({ top: 0, behavior: 'instant' });
    // Reinitialise scroll-triggered fade-ins
    initFadeIn();
  } catch (err) {
    console.error('Page render error:', err);
    root.innerHTML = `<div class="page-error">
      <p>Something went wrong loading this page.</p>
      <pre style="font-family:var(--font-mono);font-size:12px;color:var(--color-muted);margin-top:16px;">${err.message}</pre>
      <a href="#/" class="btn-primary" style="margin-top:24px;display:inline-block;">GO HOME</a>
    </div>`;
  }
}

// ─── Scroll-triggered fade-in ────────────────────────────────────────────────

function initFadeIn() {
  const els = root.querySelectorAll('.fade-in');
  if (!els.length) return;

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('fade-in-visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

  els.forEach(el => observer.observe(el));
}

// ─── Nav state ───────────────────────────────────────────────────────────────

function updateNav() {
  const walletBtn = document.getElementById('nav-wallet-btn');
  const walletInfo = document.getElementById('nav-wallet-info');
  const walletAddr = document.getElementById('nav-wallet-addr');

  if (Auth.isConnected()) {
    const wallet = Auth.getWallet();
    walletBtn.style.display = 'none';
    walletInfo.style.display = 'flex';
    walletAddr.textContent = truncateAddress(wallet);
  } else {
    walletBtn.style.display = '';
    walletInfo.style.display = 'none';
  }

  // Highlight active nav link
  const currentPath = (window.location.hash.replace(/^#/, '') || '/').split('?')[0];
  document.querySelectorAll('.nav-link').forEach(link => {
    const href = (link.getAttribute('href') || '').replace(/^#/, '');
    link.classList.toggle('nav-link-active', href === currentPath && href !== '#');
  });
}

// ─── Wallet connect button ────────────────────────────────────────────────────

document.getElementById('nav-wallet-btn').addEventListener('click', async () => {
  const btn = document.getElementById('nav-wallet-btn');
  btn.disabled = true;
  btn.textContent = 'Connecting...';
  try {
    await connectWallet();
    updateNav();
    showToast('Wallet connected.', 'success');
    // If on dashboard, reload it
    const route = matchPath(window.location.hash);
    if (route.page === 'dashboard') loadPage(route);
  } catch (err) {
    console.error('Wallet connect error:', err);
    showToast(err.message || 'Could not connect wallet.', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Connect Wallet';
  }
});

// ─── Disconnect ───────────────────────────────────────────────────────────────

document.getElementById('nav-disconnect-btn').addEventListener('click', () => {
  Auth.clear();
  updateNav();
  showToast('Disconnected.', 'info');
  window.location.hash = '#/';
});

// ─── Mobile hamburger ─────────────────────────────────────────────────────────

const hamburger = document.getElementById('nav-hamburger');
const navLinks = document.getElementById('nav-links');
hamburger.addEventListener('click', () => {
  const open = navLinks.classList.toggle('nav-links-open');
  hamburger.classList.toggle('open', open);
  hamburger.setAttribute('aria-expanded', open);
});
// Close on link click
navLinks.addEventListener('click', (e) => {
  if (e.target.classList.contains('nav-link')) {
    navLinks.classList.remove('nav-links-open');
    hamburger.classList.remove('open');
  }
});

// ─── Toast system ─────────────────────────────────────────────────────────────

function showToast(message, type = 'info') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.textContent = message;
  container.appendChild(toast);
  // Animate in
  requestAnimationFrame(() => toast.classList.add('toast-visible'));
  // Auto-remove after 4s
  setTimeout(() => {
    toast.classList.remove('toast-visible');
    toast.addEventListener('transitionend', () => toast.remove(), { once: true });
  }, 4000);
}
window.__colonyToast = showToast;

// ─── Global modal system ──────────────────────────────────────────────────────

function showModal(html, { onClose } = {}) {
  const overlay = document.getElementById('global-modal');
  const content = document.getElementById('global-modal-content');
  content.innerHTML = html;
  overlay.style.display = 'flex';
  overlay.setAttribute('aria-hidden', 'false');

  const close = () => {
    overlay.style.display = 'none';
    content.innerHTML = '';
    if (onClose) onClose();
  };

  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); }, { once: true });
  const closeBtn = content.querySelector('[data-modal-close]');
  if (closeBtn) closeBtn.addEventListener('click', close);

  return close;
}
window.__colonyModal = showModal;

// ─── Watch wallet events ──────────────────────────────────────────────────────

try {
  watchWalletEvents({
    onAccountsChanged: (accounts) => {
      if (!accounts.length) {
        Auth.clear();
        updateNav();
        showToast('Wallet disconnected.', 'info');
      }
    },
    onChainChanged: () => {
      window.location.reload();
    },
  });
} catch (e) {
  // No wallet installed — fine, listeners not needed
}

// ─── Router ───────────────────────────────────────────────────────────────────

function handleRoute() {
  const route = matchPath(window.location.hash);
  updateNav();
  loadPage(route);
}

window.addEventListener('hashchange', handleRoute);
// Initial load
handleRoute();

</script>
