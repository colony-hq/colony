/* ======== api ======== */
/**
 * Colony HQ — API Client
 * All calls target same-origin. Returns parsed JSON.
 * Throws on non-2xx responses with { message } payload.
 */

// ── Helpers ──────────────────────────────────────────────────────────────────

/**
 * Build a URL query string from a plain object.
 * Omits keys with null / undefined values.
 * @param {Record<string, any>} params
 * @returns {string}  e.g. "?category=ai&page=2"
 */
function buildQuery(params = {}) {
  const entries = Object.entries(params).filter(
    ([, v]) => v !== null && v !== undefined && v !== ''
  );
  if (!entries.length) return '';
  return '?' + new URLSearchParams(entries).toString();
}

/**
 * Wrapper around fetch that parses JSON and surfaces HTTP errors.
 * @param {string}  url
 * @param {RequestInit} [opts]
 * @returns {Promise<any>}
 */
async function request(url, opts = {}) {
const BACKEND_URL = "http://43.134.76.146";
  const res = await fetch(url.startsWith("/") ? BACKEND_URL + url : url, opts);

  // Try to parse JSON regardless of status so we get the error message
  let body;
  const contentType = res.headers.get('content-type') || '';
  if (contentType.includes('application/json')) {
    body = await res.json();
  } else {
    body = await res.text();
  }

  if (!res.ok) {
    // Extract a short, clean message — don't leak raw platform error blobs
    let message = `HTTP ${res.status}`;
    if (body && typeof body === 'object') {
      message = body.message || body.error || body.detail || message;
    } else if (typeof body === 'string' && body.length < 200) {
      message = body;
    }
    // Strip Vercel internal identifiers (e.g. "NOT_FOUND sin1::qsjpj-...")
    message = message.replace(/\s+[a-z0-9]{3,}::[a-z0-9_-]+/gi, '').trim();
    if (res.status === 404) message = 'Backend not reachable — this is a frontend preview.';
    if (res.status === 401) message = 'Not authenticated. Please connect your wallet.';
    if (res.status >= 500) message = 'Server error. Try again later.';
    const err = new Error(message);
    err.status = res.status;
    throw err;
  }

  return body;
}

/**
 * Authenticated request — injects Bearer token header.
 * @param {string}  url
 * @param {string}  token
 * @param {RequestInit} [opts]
 */
function authRequest(url, token, opts = {}) {
  // local_ tokens are fallback-only; don't send them to server
  const headers = { ...(opts.headers || {}) };
  if (token && !token.startsWith('local_')) {
    headers.Authorization = `Bearer ${token}`;
  }
  return request(url, { ...opts, headers });
}

/**
 * Authenticated JSON POST/PATCH/DELETE helper.
 */
function authJSON(method, url, token, data) {
  return authRequest(url, token, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data),
  });
}

// ── API Object ────────────────────────────────────────────────────────────────

const API = {

  // ── Auth ──────────────────────────────────────────────────────────────────

  /**
   * Get a sign-in challenge message for the given wallet address.
   * @param {string} wallet  Checksummed EVM address
   */
  getMessage: (wallet) =>
    request(`/api/auth/message?wallet=${encodeURIComponent(wallet)}`),

  /**
   * Verify a signed message and return a JWT.
   * @param {string} wallet     EVM address
   * @param {string} signature  Hex signature from personal_sign
   */
  verify: (wallet, signature) =>
    request('/api/auth/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ wallet, signature }),
    }),

  /**
   * Fetch the authenticated user's profile.
   * @param {string} token  JWT
   */
  me: (token) => authRequest('/api/auth/me', token),

  /**
   * Update the authenticated user's profile (username, bio, avatar, etc.).
   * @param {string} token
   * @param {{ username?: string, bio?: string, avatar?: string }} data
   */
  updateProfile: (token, data) =>
    authJSON('PATCH', '/api/auth/me', token, data),


  // ── Public ────────────────────────────────────────────────────────────────

  /**
   * Global platform stats (agent count, installs, creators, …).
   */
  stats: () => request('/api/stats'),

  /**
   * All agent categories.
   */
  categories: () => request('/api/categories'),

  /**
   * Browse / search agents with optional filters.
   * @param {{ category?: string, sort?: string, query?: string, page?: number, limit?: number, free?: boolean }} [params]
   */
  agents: (params = {}) =>
    request(`/api/agents${buildQuery(params)}`),

  /**
   * Fetch a single agent by ID or slug.
   * @param {string} id
   */
  agent: (id) => request(`/api/agents/${encodeURIComponent(id)}`),

  /**
   * Get USDC balance for a wallet on Base.
   * @param {string} wallet  EVM address
   */
  walletBalance: (wallet) =>
    request(`/api/wallet/balance?wallet=${encodeURIComponent(wallet)}`),


  // ── Authenticated ─────────────────────────────────────────────────────────

  /**
   * Install / add an agent to the authenticated user's collection.
   * Returns payment intent (price, address) for paid agents.
   * @param {string} id     Agent ID
   * @param {string} token  JWT
   */
  install: (id, token) =>
    authJSON('POST', `/api/agents/${encodeURIComponent(id)}/install`, token, {}),

  /**
   * Confirm an on-chain USDC payment for a paid agent.
   * @param {string} id      Agent ID
   * @param {string} txHash  Transaction hash
   * @param {string} token   JWT
   */
  confirmPayment: (id, txHash, token) =>
    authJSON('POST', `/api/agents/${encodeURIComponent(id)}/confirm-payment`, token, { txHash }),

  /**
   * Submit a review for an agent.
   * @param {string} id    Agent ID
   * @param {{ rating: number, comment: string }} data
   * @param {string} token JWT
   */
  addReview: (id, data, token) =>
    authJSON('POST', `/api/agents/${encodeURIComponent(id)}/reviews`, token, data),

  /**
   * Publish a new agent.
   * @param {{ name: string, description: string, category: string, price: number, capabilities: string[], endpoint?: string }} data
   * @param {string} token  JWT
   */
  createAgent: (data, token) =>
    authJSON('POST', '/api/agents', token, data),

  /**
   * Update an existing agent (creator only).
   * @param {string} id    Agent ID
   * @param {Partial<AgentData>} data
   * @param {string} token JWT
   */
  updateAgent: (id, data, token) =>
    authJSON('PATCH', `/api/agents/${encodeURIComponent(id)}`, token, data),

  /**
   * Delete an agent (creator only).
   * @param {string} id    Agent ID
   * @param {string} token JWT
   */
  deleteAgent: (id, token) =>
    authRequest(`/api/agents/${encodeURIComponent(id)}`, token, {
      method: 'DELETE',
    }),

  /**
   * Send a chat message to an agent and receive a response.
   * @param {string} id       Agent ID
   * @param {string} message  User message text
   * @param {Array<{ role: 'user'|'assistant', content: string }>} history  Prior turns
   * @param {string|null} [apiKey]  Optional user-supplied API key for the agent
   * @param {string} token    JWT
   */
  chat: (id, message, history = [], apiKey = null, token) =>
    authJSON('POST', `/api/agents/${encodeURIComponent(id)}/chat`, token, {
      message,
      history,
      ...(apiKey ? { apiKey } : {}),
    }),


  // ── Creator ───────────────────────────────────────────────────────────────

  /**
   * List all agents owned by the authenticated user.
   * @param {string} token  JWT
   */
  myAgents: (token) => authRequest('/api/creator/agents', token),

  /**
   * Fetch earnings summary and payout history.
   * @param {string} token  JWT
   */
  earnings: (token) => authRequest('/api/creator/earnings', token),

  /**
   * Fetch per-agent analytics (installs over time, chat volume, ratings).
   * @param {string} token  JWT
   * @param {string} [agentId]  Filter to a specific agent
   */
  analytics: (token, agentId) =>
    authRequest(
      `/api/creator/analytics${buildQuery({ agentId })}`,
      token
    ),

};

API;


// ── Auth Helper ───────────────────────────────────────────────────────────────

/**
 * Thin wrapper around localStorage for auth state.
 * Token key: 'colony_token'
 * Wallet key: 'colony_wallet'
 */
const Auth = {
  /** @returns {string|null} */
  getToken: () => localStorage.getItem('colony_token'),

  /** @returns {string|null} */
  getWallet: () => localStorage.getItem('colony_wallet'),

  /**
   * Persist both token and wallet address after successful sign-in.
   * @param {string} token
   * @param {string} wallet
   */
  setAuth: (token, wallet) => {
    localStorage.setItem('colony_token', token);
    localStorage.setItem('colony_wallet', wallet);
  },

  /** Wipe auth state (sign out). */
  clear: () => {
    localStorage.removeItem('colony_token');
    localStorage.removeItem('colony_wallet');
  },

  /** @returns {boolean} Whether the user has a stored token. */
  isConnected: () => !!localStorage.getItem('colony_token'),
};


/* ======== wallet ======== */
/**
 * Colony HQ — Wallet Module
 *
 * MetaMask / EIP-1193 wallet connection, message signing,
 * and USDC token transfers on Base mainnet.
 *
 * No external dependencies — uses window.ethereum (injected provider).
 */


// ── Constants ─────────────────────────────────────────────────────────────────

/** Base mainnet chain ID (decimal 8453, hex 0x2105) */
const BASE_CHAIN_ID = '0x2105';
const BASE_CHAIN_ID_DEC = 8453;

/** USDC contract on Base mainnet */
const USDC_CONTRACT = '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913';

/** ERC-20 transfer(address,uint256) selector */
const ERC20_TRANSFER_SELECTOR = '0xa9059cbb';

/** USDC has 6 decimals */
const USDC_DECIMALS = 6;


// ── Helpers ───────────────────────────────────────────────────────────────────

/**
 * Returns the injected EIP-1193 provider or throws if unavailable.
 * @returns {import('ethers').Eip1193Provider}
 */
function getProvider() {
  if (typeof window === 'undefined' || !window.ethereum) {
    throw new Error(
      'No wallet detected. Please install MetaMask or another EIP-1193 wallet.'
    );
  }
  return window.ethereum;
}

/**
 * Left-pad a hex string to 32 bytes (64 hex chars), no 0x prefix.
 * @param {string} hex  With or without 0x prefix
 * @returns {string}
 */
function padLeft32(hex) {
  return hex.replace(/^0x/, '').padStart(64, '0');
}

/**
 * Encode an ERC-20 transfer(address,uint256) call.
 * @param {string} toAddress   Checksummed EVM address
 * @param {bigint} amountWei   Amount in smallest unit (6 decimals for USDC)
 * @returns {string}           ABI-encoded hex calldata
 */
function encodeERC20Transfer(toAddress, amountWei) {
  const paddedAddress = padLeft32(toAddress.toLowerCase());
  const paddedAmount  = padLeft32(amountWei.toString(16));
  return `${ERC20_TRANSFER_SELECTOR}${paddedAddress}${paddedAmount}`;
}

/**
 * Convert a human-readable USDC amount to its raw uint256 value.
 * @param {number|string} amount  e.g. 5 → 5_000_000n
 * @returns {bigint}
 */
function toUSDCUnits(amount) {
  // Multiply by 10^6, handling fractional amounts
  const scaled = Math.round(Number(amount) * 10 ** USDC_DECIMALS);
  return BigInt(scaled);
}

/**
 * Ask MetaMask to switch to Base mainnet; add the network if it's missing.
 * @param {import('ethers').Eip1193Provider} provider
 */
async function ensureBaseChain(provider) {
  const currentChainId = await provider.request({ method: 'eth_chainId' });

  if (currentChainId === BASE_CHAIN_ID) return; // already on Base

  try {
    await provider.request({
      method: 'wallet_switchEthereumChain',
      params: [{ chainId: BASE_CHAIN_ID }],
    });
  } catch (switchError) {
    // Error 4902 = chain not added to wallet
    if (switchError.code === 4902) {
      await provider.request({
        method: 'wallet_addEthereumChain',
        params: [
          {
            chainId: BASE_CHAIN_ID,
            chainName: 'Base',
            nativeCurrency: { name: 'Ether', symbol: 'ETH', decimals: 18 },
            rpcUrls: ['https://mainnet.base.org'],
            blockExplorerUrls: ['https://basescan.org'],
          },
        ],
      });
    } else {
      throw switchError;
    }
  }
}


// ── Public API ────────────────────────────────────────────────────────────────

/**
 * Connect a MetaMask (EIP-1193) wallet and authenticate with the Colony API.
 *
 * Flow:
 *   1. Request account access via eth_requestAccounts
 *   2. Resolve the connected wallet address
 *   3. Fetch a sign-in challenge from the API
 *   4. Ask the wallet to sign it with personal_sign
 *   5. Verify the signature against the API
 *   6. Persist the JWT + address to localStorage
 *
 * @returns {Promise<{ wallet: string, token: string, user: object }>}
 * @throws  {Error}  If the user rejects any step or network fails
 */
async function connectWallet() {
  const provider = getProvider();

  // 1 — Request account access
  const accounts = await provider.request({ method: 'eth_requestAccounts' });
  if (!accounts || accounts.length === 0) {
    throw new Error('No accounts returned from wallet.');
  }

  // 2 — Grab the first / active account
  const wallet = accounts[0].toLowerCase();

  // 3 — Try full backend auth (sign message → JWT)
  try {
    const msgRes = await API.getMessage(wallet);
    const message = msgRes && msgRes.message;

    if (message) {
      // 4 — Sign the challenge
      const msgHex = '0x' + Array.from(new TextEncoder().encode(message))
        .map(b => b.toString(16).padStart(2, '0'))
        .join('');

      const signature = await provider.request({
        method: 'personal_sign',
        params: [msgHex, wallet],
      });

      // 5 — Verify with the API → receive JWT
      const res = await API.verify(wallet, signature);
      if (res && res.token) {
        Auth.setAuth(res.token, wallet);
        return { wallet, token: res.token, user: res.user };
      }
    }
  } catch (err) {
    // Backend unavailable — fall through to local-only mode
    console.warn('Backend auth unavailable, using local wallet mode:', err.message);
  }

  // 6 — Fallback: store wallet address locally without JWT
  // UI shows connected; authenticated API calls will fail gracefully
  const localToken = 'local_' + wallet;
  Auth.setAuth(localToken, wallet);
  return { wallet, token: localToken, user: { wallet, name: '', is_creator: false } };
}


/**
 * Disconnect the current session (client-side only — clears localStorage).
 * Does not revoke the JWT on the server.
 */
function disconnectWallet() {
  Auth.clear();
}


/**
 * Send USDC on Base mainnet to a recipient address.
 *
 * Encodes an ERC-20 transfer call and submits it via eth_sendTransaction.
 * Switches the wallet to Base if it's on a different chain.
 *
 * @param {string}         toAddress   Recipient EVM address (checksummed or lowercase)
 * @param {number|string}  amountUsdc  Human-readable USDC amount, e.g. 5 or "2.50"
 * @returns {Promise<string>}          Transaction hash (0x…)
 * @throws  {Error}                    If the user rejects or the tx fails
 */
async function sendUSDC(toAddress, amountUsdc) {
  if (!toAddress || !/^0x[0-9a-fA-F]{40}$/.test(toAddress)) {
    throw new Error(`Invalid recipient address: ${toAddress}`);
  }

  const numAmount = Number(amountUsdc);
  if (!Number.isFinite(numAmount) || numAmount <= 0) {
    throw new Error(`Invalid USDC amount: ${amountUsdc}`);
  }

  const provider = getProvider();

  // Ensure we're on Base
  await ensureBaseChain(provider);

  // Get the current account (must already be connected)
  const accounts = await provider.request({ method: 'eth_accounts' });
  if (!accounts || accounts.length === 0) {
    throw new Error('Wallet not connected. Call connectWallet() first.');
  }
  const from = accounts[0];

  // Encode ERC-20 transfer calldata
  const amountWei = toUSDCUnits(numAmount);
  const data = encodeERC20Transfer(toAddress, amountWei);

  // Submit transaction
  const txHash = await provider.request({
    method: 'eth_sendTransaction',
    params: [
      {
        from,
        to: USDC_CONTRACT,
        data,
        // Let the wallet estimate gas; don't hard-code
      },
    ],
  });

  return txHash;
}


/**
 * Wait for a transaction to be mined and return the receipt.
 * Polls eth_getTransactionReceipt every ~2 seconds.
 *
 * @param {string}  txHash        Transaction hash (0x…)
 * @param {number}  [timeoutMs]   Max wait time in ms (default 120 000)
 * @returns {Promise<object>}     Transaction receipt object
 * @throws  {Error}               On timeout or reverted transaction
 */
async function waitForTransaction(txHash, timeoutMs = 120_000) {
  const provider = getProvider();
  const deadline = Date.now() + timeoutMs;

  while (Date.now() < deadline) {
    const receipt = await provider.request({
      method: 'eth_getTransactionReceipt',
      params: [txHash],
    });

    if (receipt) {
      // status: '0x1' = success, '0x0' = reverted
      if (receipt.status === '0x0') {
        throw new Error(`Transaction reverted: ${txHash}`);
      }
      return receipt;
    }

    await new Promise(resolve => setTimeout(resolve, 2000));
  }

  throw new Error(`Transaction not confirmed within ${timeoutMs / 1000}s: ${txHash}`);
}


/**
 * Get the current wallet's ETH balance on the active chain.
 * @returns {Promise<string>}  Balance in ETH as a decimal string (e.g. "0.0123")
 */
async function getETHBalance() {
  const provider = getProvider();
  const accounts = await provider.request({ method: 'eth_accounts' });
  if (!accounts || !accounts[0]) return '0';

  const balanceHex = await provider.request({
    method: 'eth_getBalance',
    params: [accounts[0], 'latest'],
  });

  // Convert from wei (hex) to ETH string
  const wei = BigInt(balanceHex);
  const eth = Number(wei) / 1e18;
  return eth.toFixed(6);
}


/**
 * Listen for account changes and wallet disconnection events.
 *
 * @param {{ onAccountChange?: (accounts: string[]) => void, onDisconnect?: () => void }} handlers
 * @returns {() => void}  Cleanup function — call to remove listeners
 */
function watchWalletEvents({ onAccountChange, onAccountsChanged, onDisconnect, onChainChanged } = {}) {
  if (!window.ethereum) return () => {}; // no wallet installed — silent no-op
  const provider = window.ethereum;

  const handleAccountsChanged = (accounts) => {
    if (accounts.length === 0) {
      Auth.clear();
      onDisconnect?.();
    }
    onAccountChange?.(accounts);
    onAccountsChanged?.(accounts);
  };

  const handleChainChanged = () => {
    onChainChanged?.();
    window.location.reload();
  };

  provider.on('accountsChanged', handleAccountsChanged);
  provider.on('chainChanged', handleChainChanged);

  // Return cleanup function
  return () => {
    provider.removeListener('accountsChanged', handleAccountsChanged);
    provider.removeListener('chainChanged', handleChainChanged);
  };
}


// ── Utility ───────────────────────────────────────────────────────────────────

/**
 * Shorten an EVM address to "0x1234…abcd" format.
 * @param {string|null|undefined} addr
 * @returns {string}
 */
function truncateAddress(addr) {
  if (!addr) return '';
  return addr.slice(0, 6) + '…' + addr.slice(-4);
}

/**
 * Check if the browser has an EIP-1193 provider available.
 * @returns {boolean}
 */
function isWalletAvailable() {
  return typeof window !== 'undefined' && !!window.ethereum;
}

/**
 * Returns true if window.ethereum reports MetaMask specifically.
 * @returns {boolean}
 */
function isMetaMask() {
  return isWalletAvailable() && !!window.ethereum.isMetaMask;
}


/* ======== router ======== */
/**
 * Colony HQ — SPA Router
 *
 * Hash-based routing (#/path) with named URL parameters (:id),
 * middleware support, and a simple navigation history stack.
 *
 * Usage:
 *   import { Router } from './router.js';
 *
 *   Router.onRoute(({ view, params, path }) => {
 *     renderView(view, params);
 *   });
 *
 *   Router.navigate('/agents/abc123');
 */

// ── Route Definitions ─────────────────────────────────────────────────────────

/**
 * Map of path patterns → view names.
 * Colon-prefixed segments (:id) are dynamic parameters.
 */
const ROUTES = {
  '/':                  'home',
  '/browse':            'browse',
  '/agents/:id':        'agent-detail',
  '/agents/:id/chat':   'agent-chat',
  '/create':            'create',
  '/dashboard':         'dashboard',
};

// ── Internal State ────────────────────────────────────────────────────────────

/** @type {Array<(ctx: RouteContext) => boolean|void>} */
const _middlewares = [];

/** @type {string[]} */
const _history = [];

/** @type {number} */
let _historyIndex = -1;


// ── Types (JSDoc) ─────────────────────────────────────────────────────────────

/**
 * @typedef {{ view: string, path: string, params: Record<string, string>, query: Record<string, string> }} RouteContext
 */


// ── Matching Logic ────────────────────────────────────────────────────────────

/**
 * Split a path into clean segments, filtering empty strings.
 * @param {string} path
 * @returns {string[]}
 */
function segments(path) {
  return path.split('/').filter(Boolean);
}

/**
 * Try to match a concrete path against a route pattern.
 * Returns extracted params or null if no match.
 *
 * @param {string} pattern  Route pattern, e.g. "/agents/:id/chat"
 * @param {string} path     Concrete path, e.g. "/agents/abc123/chat"
 * @returns {Record<string, string>|null}
 */
function matchRoute(pattern, path) {
  const patternSegs = segments(pattern);
  const pathSegs    = segments(path);

  if (patternSegs.length !== pathSegs.length) return null;

  const params = {};

  for (let i = 0; i < patternSegs.length; i++) {
    const p = patternSegs[i];
    const s = pathSegs[i];

    if (p.startsWith(':')) {
      // Dynamic segment → capture it
      params[p.slice(1)] = decodeURIComponent(s);
    } else if (p !== s) {
      // Static segment mismatch
      return null;
    }
  }

  return params;
}

/**
 * Find the best matching route for a given path.
 *
 * @param {string} path
 * @returns {{ view: string, params: Record<string, string> }|null}
 */
function resolve(path) {
  // Strip trailing slash (except root)
  const cleanPath = path.length > 1 ? path.replace(/\/$/, '') : path;

  for (const [pattern, view] of Object.entries(ROUTES)) {
    const params = matchRoute(pattern, cleanPath);
    if (params !== null) {
      return { view, params };
    }
  }

  return null;
}

/**
 * Parse the query string portion of a hash URL.
 * e.g. "#/browse?category=ai&page=2" → { category: 'ai', page: '2' }
 *
 * @param {string} hash  Full hash including leading #
 * @returns {{ path: string, query: Record<string, string> }}
 */
function parseHash(hash = '') {
  const raw = hash.startsWith('#') ? hash.slice(1) : hash;
  const [pathPart, queryPart = ''] = raw.split('?');
  const path  = pathPart || '/';
  const query = {};

  if (queryPart) {
    new URLSearchParams(queryPart).forEach((value, key) => {
      query[key] = value;
    });
  }

  return { path, query };
}


// ── Router Object ─────────────────────────────────────────────────────────────

const Router = {

  // ── Navigation ─────────────────────────────────────────────────────────────

  /**
   * Navigate to a path by updating the URL hash.
   * Pushes to the internal history stack.
   *
   * @param {string} path      e.g. '/agents/abc123'
   * @param {Record<string, string>} [query]  Optional query params
   */
  navigate(path, query = {}) {
    const queryStr = Object.keys(query).length
      ? '?' + new URLSearchParams(query).toString()
      : '';
    const hash = '#' + path + queryStr;

    // Don't push duplicate consecutive entries
    if (window.location.hash !== hash) {
      window.location.hash = hash;

      // Trim forward history when navigating mid-stack
      _history.splice(_historyIndex + 1);
      _history.push(hash);
      _historyIndex = _history.length - 1;
    }
  },

  /**
   * Replace the current history entry without creating a new one.
   * @param {string} path
   * @param {Record<string, string>} [query]
   */
  replace(path, query = {}) {
    const queryStr = Object.keys(query).length
      ? '?' + new URLSearchParams(query).toString()
      : '';
    const hash = '#' + path + queryStr;
    window.location.replace(hash);
    if (_history.length === 0) {
      _history.push(hash);
      _historyIndex = 0;
    } else {
      _history[_historyIndex] = hash;
    }
  },

  /**
   * Go back one step in the router's history stack.
   * Falls back to '/' if no history.
   */
  back() {
    if (_historyIndex > 0) {
      _historyIndex--;
      window.location.hash = _history[_historyIndex];
    } else {
      Router.navigate('/');
    }
  },

  /**
   * Go forward one step in the history stack.
   */
  forward() {
    if (_historyIndex < _history.length - 1) {
      _historyIndex++;
      window.location.hash = _history[_historyIndex];
    }
  },


  // ── Current State ──────────────────────────────────────────────────────────

  /**
   * Returns the current path (without query string).
   * @returns {string}  e.g. '/agents/abc123'
   */
  current() {
    const { path } = parseHash(window.location.hash);
    return path;
  },

  /**
   * Extract named URL parameters for the current path.
   * e.g. on '/agents/abc123' with pattern '/agents/:id' → { id: 'abc123' }
   * @returns {Record<string, string>}
   */
  params() {
    const path = Router.current();
    const match = resolve(path);
    return match ? match.params : {};
  },

  /**
   * Returns the current URL query parameters.
   * @returns {Record<string, string>}
   */
  query() {
    const { query } = parseHash(window.location.hash);
    return query;
  },

  /**
   * Get the view name for the current path.
   * @returns {string}  e.g. 'agent-detail', or '404' if unmatched
   */
  currentView() {
    const match = resolve(Router.current());
    return match ? match.view : '404';
  },

  /**
   * Build a full URL for a named route, filling in params.
   * @param {string} pattern   Route pattern, e.g. '/agents/:id'
   * @param {Record<string, string>} [params]  e.g. { id: 'abc123' }
   * @param {Record<string, string>} [query]
   * @returns {string}         e.g. '/agents/abc123'
   */
  buildPath(pattern, params = {}, query = {}) {
    let path = pattern;
    for (const [key, value] of Object.entries(params)) {
      path = path.replace(`:${key}`, encodeURIComponent(value));
    }
    const queryStr = Object.keys(query).length
      ? '?' + new URLSearchParams(query).toString()
      : '';
    return path + queryStr;
  },


  // ── Middleware ─────────────────────────────────────────────────────────────

  /**
   * Register a middleware that runs before each route change.
   * Return false (or throw) to block navigation.
   *
   * @param {(ctx: RouteContext) => boolean|void} fn
   */
  use(fn) {
    _middlewares.push(fn);
  },


  // ── Event Subscription ─────────────────────────────────────────────────────

  /**
   * Register a callback that fires on every route change, including the
   * initial load. The callback receives a RouteContext object.
   *
   * @param {(ctx: RouteContext) => void} callback
   * @returns {() => void}  Unsubscribe function
   */
  onRoute(callback) {
    const handler = () => {
      const { path, query } = parseHash(window.location.hash);
      const match = resolve(path);

      const ctx = {
        path,
        query,
        view:   match ? match.view   : '404',
        params: match ? match.params : {},
      };

      // Run middlewares
      for (const mw of _middlewares) {
        try {
          const result = mw(ctx);
          if (result === false) return; // blocked
        } catch (err) {
          console.error('[Router] Middleware error:', err);
          return;
        }
      }

      callback(ctx);
    };

    window.addEventListener('hashchange', handler);

    // Initialise — seed history with current URL
    const currentHash = window.location.hash || '#/';
    if (_history.length === 0) {
      _history.push(currentHash);
      _historyIndex = 0;
    }

    // Fire immediately for the current route
    handler();

    // Return unsubscribe
    return () => window.removeEventListener('hashchange', handler);
  },


  // ── Guards (built-in middleware helpers) ───────────────────────────────────

  /**
   * Redirect unauthenticated users away from protected views.
   *
   * @param {() => boolean} isAuthenticated  Predicate function
   * @param {string[]} protectedViews        View names that require auth
   * @param {string} [loginPath='/']         Where to redirect if not authed
   */
  requireAuth(isAuthenticated, protectedViews = [], loginPath = '/') {
    Router.use((ctx) => {
      if (protectedViews.includes(ctx.view) && !isAuthenticated()) {
        // Save intended destination so we can redirect after login
        sessionStorage.setItem('colony_redirect', ctx.path);
        Router.replace(loginPath);
        return false;
      }
    });
  },

  /**
   * After a successful login, redirect to the saved destination (if any).
   * Clears the saved path from sessionStorage.
   *
   * @param {string} [fallback='/dashboard']
   */
  redirectAfterLogin(fallback = '/dashboard') {
    const intended = sessionStorage.getItem('colony_redirect');
    sessionStorage.removeItem('colony_redirect');
    Router.navigate(intended || fallback);
  },

};


// ── Named Route Helpers ───────────────────────────────────────────────────────

/**
 * Convenience helpers for navigating to well-known routes.
 * Avoids string literals scattered through view code.
 */
const Routes = {
  home:        ()   => Router.navigate('/'),
  browse:      (q)  => Router.navigate('/browse', q),
  agentDetail: (id) => Router.navigate(Router.buildPath('/agents/:id', { id })),
  agentChat:   (id) => Router.navigate(Router.buildPath('/agents/:id/chat', { id })),
  create:      ()   => Router.navigate('/create'),
  dashboard:   ()   => Router.navigate('/dashboard'),
};


// ── Link Intercept (optional) ─────────────────────────────────────────────────

/**
 * Intercept clicks on <a href="#/..."> elements so the router handles
 * them, rather than the browser's default hash navigation.
 *
 * Call once during app init if you want programmatic control over link clicks.
 */
function interceptLinks() {
  document.addEventListener('click', (e) => {
    const link = e.target.closest('a[href^="#/"]');
    if (!link) return;

    e.preventDefault();
    const hash = link.getAttribute('href');
    const { path, query } = parseHash(hash);
    Router.navigate(path, query);
  });
}

// Scroll Fade-In via IntersectionObserver
// ─────────────────────────────────────────────────────────────────────────────

/**
 * Observe all .fade-in elements inside a container.
 * Adds .visible when they enter the viewport — triggers the CSS transition.
 * Each element is observed only once.
 *
 * @param {HTMLElement} container
 */
function initFadeIn(container) {
  if (!('IntersectionObserver' in window)) {
    // Fallback: make everything visible immediately
    container.querySelectorAll('.fade-in').forEach(el => el.classList.add('visible'));
    return;
  }

  const observer = new IntersectionObserver(
    (entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    },
    { threshold: 0.08, rootMargin: '0px 0px -40px 0px' }
  );

  container.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
}

/**
 * After adding new .fade-in elements to the DOM, register them with
 * the IntersectionObserver (or make visible immediately if not supported).
 *
 * @param {NodeList|HTMLElement[]} elements
 */
function observeFadeIn(elements) {
  if (!('IntersectionObserver' in window)) {
    elements.forEach(el => el.classList.add('visible'));
    return;
  }

  const observer = new IntersectionObserver(
    (entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    },
    { threshold: 0.08, rootMargin: '0px 0px -40px 0px' }
  );

  elements.forEach(el => observer.observe(el));
}

/**

  const F = (t) => `<span class="token-fn">${t}</span>`;

  return [
    `${C('# colony_agent.py')}`,
    `${K('from')} colony ${K('import')} ${F('Agent')}, ${F('respond')}`,
    ``,
    `agent = ${F('Agent')}(`,
    `    name=${S('"price-monitor"')},`,
    `    description=${S('"Watches on-chain prices"')},`,
    `    price=${N('4.99')},  ${C('# USDC per deployment')}`,
    `)`,
    ``,
    `${K('@agent.on_message')}`,
    `${K('async def')} ${F('handle')}(message: str) -> str:`,
    `    ${C('# put your logic here')}`,
    `    result = ${K('await')} ${F('process')}(message)`,
    `    ${K('return')} ${F('respond')}(result)`,
    ``,
    `${K('if')} __name__ == ${S('"__main__"')}:`,
    `    agent.${F('serve')}(port=${N('8080')})`,
  ].join('\n');
}

/**
 * Fetch the 6 newest agents and render them in the featured grid.
 * Replaces skeleton cards with real cards, or shows an empty state.
 *
 * Expected API response:
 *   Array of agent objects  OR  { agents: [...], total: N }
 */
async function fetchFeaturedAgents(container) {
  const grid   = container.querySelector('#home-agents-grid');
  const footer = container.querySelector('#home-agents-footer');
  if (!grid) return;

  // Show 6 skeleton cards while loading
  fillWithSkeletons(grid, 6, skeletonAgentCard);

  try {
    const res = await API.agents({ sort: 'newest', limit: 6 });

    // Normalise: API may return array or { agents, total }
    const agents = Array.isArray(res) ? res : (res.agents || []);

    grid.innerHTML = '';

    if (agents.length === 0) {
      // Empty marketplace state
      grid.style.display = 'block';
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1;">
          <div class="empty-state__title">The marketplace is empty.</div>
          <p class="empty-state__body">
            If you've built an AI agent, publish it here.
          </p>
          <button class="btn btn-primary" id="btn-empty-publish" style="margin-top:8px;">
            Publish an Agent
          </button>
        </div>`;
      grid.querySelector('#btn-empty-publish')
        ?.addEventListener('click', () => Router.navigate('/create'));
      return;
    }

    grid.style.display = '';
    const newCards = [];
    agents.forEach(agent => {
      const card = renderAgentCard(agent);
      grid.appendChild(card);
      newCards.push(card);
    });

    // Observe only the new cards for fade-in (not the whole container again)
    observeFadeIn(newCards);

    // Show footer "View all" button
    if (footer) footer.style.display = 'block';

  } catch (_err) {
    // Replace skeletons with a simple error state
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1;">
        <div class="empty-state__title" style="color:var(--text-muted);">Could not load agents.</div>
        <p class="empty-state__body">Check your connection and try refreshing.</p>
      </div>`;
  }
}

/**
 * Fetch all categories and render the 3×3 category grid.
 * Replaces skeletons with real category cards.

 * Expected API response:
 *   Array of { id, name, description, count? }

/** Escape a string for safe insertion into HTML text nodes. */
function esc(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

/** Format a number with locale commas. */
function fmt(n) {
  return Number(n).toLocaleString('en-US');
}

/**
 * Debounce a function — only calls `fn` after `wait` ms of silence.
 * Returns a cancel function.
 *
 * @param {Function} fn
 * @param {number} wait  Milliseconds
 * @returns {{ debounced: Function, cancel: Function }}
 */
function debounce(fn, wait) {
  let timer;
  const debounced = (...args) => {
    clearTimeout(timer);
    timer = setTimeout(() => fn(...args), wait);
  };
  const cancel = () => clearTimeout(timer);
  return { debounced, cancel };
}

// ─────────────────────────────────────────────────────────────────────────────
// Page State
// ─────────────────────────────────────────────────────────────────────────────

/**
 * Mutable browse state object.
 * Initialised from URL params, updated on every filter interaction.
 *
 * @typedef {{ category: string, sort: string, search: string, offset: number, total: number }} BrowseState
 */

/** Build initial state from current URL query params. */
function initState() {
  const q = Router.query();
  return {
    category: q.category || '',
    sort:     q.sort     || 'popular',
    search:   q.search   || '',
    offset:   0,
    total:    0,     // filled in after first fetch
  };
}


// ─────────────────────────────────────────────────────────────────────────────
// URL Sync
// ─────────────────────────────────────────────────────────────────────────────

/**
 * Replace the current URL hash to reflect current filter state.
 * Omits default/empty values to keep URLs clean.
 *
 * @param {BrowseState} state
 */
function syncURL(state) {
  const params = {};
  if (state.category) params.category = state.category;
  if (state.sort && state.sort !== 'popular') params.sort = state.sort;
  if (state.search)   params.search   = state.search;

  // Build query string manually (empty object = no ?query)
  const qs = Object.keys(params).length
    ? '?' + new URLSearchParams(params).toString()
    : '';

  Router.replace('/browse' + qs);
}

function updateSortButtons(sortBar, activeSortId) {

/**
 * Update the pagination controls.
 *
 * @param {HTMLElement} paginationEl
 * @param {BrowseState} state
 */
function updatePagination(paginationEl, state) {
  const start = state.offset + 1;
  const end   = Math.min(state.offset + PAGE_LIMIT, state.total);
  const total = state.total;

  const prevBtn = paginationEl.querySelector('#browse-prev');
  const nextBtn = paginationEl.querySelector('#browse-next');
  const label   = paginationEl.querySelector('#browse-count-label');

  if (prevBtn) prevBtn.disabled = state.offset === 0;
  if (nextBtn) nextBtn.disabled = (state.offset + PAGE_LIMIT) >= total;

  if (label) {
    label.textContent = total > 0
      ? `Showing ${start}–${end} of ${fmt(total)} agents`
      : 'No agents';
  }
}

 * Update the live agent count in the page headline.
 * @param {HTMLElement} container
 * @param {number} total

function updateHeadlineCount(container, total) {
  const el = container.querySelector('#browse-agent-count');
  if (el) el.textContent = total > 0 ? `${fmt(total)} agents` : '';
}


// ─────────────────────────────────────────────────────────────────────────────
// Agent Fetcher + Grid Renderer
// ─────────────────────────────────────────────────────────────────────────────

/**
 * Fetch agents from the API using current state and render them into the grid.
 * Handles loading, empty states, and errors.
 *
 * @param {HTMLElement} container   Root container element
 * @param {BrowseState} state       Current filter/page state
 */
async function loadAgents(container, state) {
  const grid       = container.querySelector('#browse-grid');
  const pagination = container.querySelector('#browse-pagination');
  if (!grid) return;

  // Show skeletons immediately
  showSkeletonGrid(grid);

  try {
    // Build API params — omit empty strings so they don't pollute the query
    const params = {
      limit:  PAGE_LIMIT,
      offset: state.offset,
    };
    if (state.sort)     params.sort     = state.sort;
    if (state.category) params.category = state.category;
    if (state.search)   params.query    = state.search;

    const res = await API.agents(params);

    // Normalise: API may return array or { agents: [...], total: N }
    const agents = Array.isArray(res) ? res : (res.agents || []);
    const total  = Array.isArray(res) ? res.length : (res.total ?? agents.length);

    // Persist total in state for pagination math
    state.total = total;

    grid.innerHTML = '';

    // ── Update live count headline ──────────────────────────────────────────
    updateHeadlineCount(container, total);

    // ── Pagination ──────────────────────────────────────────────────────────
    if (pagination) updatePagination(pagination, state);

    if (agents.length === 0) {
      renderEmptyState(grid, state);
      if (pagination) pagination.style.display = 'none';
      return;
    }

    if (pagination) {
      pagination.style.display = total <= PAGE_LIMIT ? 'none' : 'flex';
    }

    agents.forEach(agent => grid.appendChild(renderAgentCard(agent)));

  } catch (_err) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1;">
        <div class="empty-state__title" style="color:var(--text-muted);">Could not load agents.</div>
        <p class="empty-state__body">Check your connection and try again.</p>
      </div>`;
    if (pagination) pagination.style.display = 'none';
  }
}

/**
 * Render an empty state inside the grid element, with context-aware messaging.
 *
 * @param {HTMLElement} grid
 * @param {BrowseState} state
 */
function renderEmptyState(grid, state) {
  let title, body, showPublish;

  if (state.category && !state.search) {
    // Category has no agents
    const pill   = CATEGORY_PILLS.find(p => p.id === state.category);
    const catLabel = pill ? pill.label : state.category;
    title       = `Nobody has published an agent in ${catLabel} yet.`;
    body        = 'Be the first. Publish your agent and claim this category.';
    showPublish = true;
  } else if (state.search) {
    // Search returned no results
    title       = 'No agents found.';
    body        = `No results for "${esc(state.search)}". Try a different search or browse a category.`;
    showPublish = false;
  } else {
    // Completely empty marketplace
    title       = 'The marketplace is empty.';
    body        = 'No agents have been published yet. Build and publish the first one.';
    showPublish = true;
  }

  grid.innerHTML = `
    <div class="empty-state" style="grid-column:1/-1;">
      <div class="empty-state__title">${title}</div>
      <p class="empty-state__body">${body}</p>
      ${showPublish
        ? `<button class="btn btn-primary" id="browse-empty-publish" style="margin-top:8px;">
             Publish an Agent
           </button>`
        : ''}
    </div>`;

  grid.querySelector('#browse-empty-publish')
    ?.addEventListener('click', () => Router.navigate('/create'));
}

// Event Wiring
// ─────────────────────────────────────────────────────────────────────────────

/**
 * Attach all interactive event listeners on the browse page.
 * Modifies `state` in place and re-calls `loadAgents` on changes.
 *
 * @param {HTMLElement} container
 * @param {BrowseState} state
 */
function wireEvents(container, state) {

  // ── Search bar ────────────────────────────────────────────────────────────
  const searchInput = container.querySelector('#browse-search');

  // Build a debounced version that fires 500 ms after typing stops
  const { debounced: debouncedSearch, cancel: cancelSearch } = debounce(() => {
    const val = searchInput.value.trim();
    if (val === state.search) return;  // No change
    state.search = val;
    state.offset = 0;
    syncURL(state);
    loadAgents(container, state);
  }, 500);

  searchInput?.addEventListener('input', debouncedSearch);

  // Also trigger immediately on Enter key
  searchInput?.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    cancelSearch();
    const val = searchInput.value.trim();
    if (val === state.search) return;
    state.search = val;
    state.offset = 0;
    syncURL(state);
    loadAgents(container, state);
  });


  // ── Category pills ────────────────────────────────────────────────────────
  const filterBar = container.querySelector('#browse-filter-bar');
  filterBar?.addEventListener('click', (e) => {
    const pill = e.target.closest('[data-category-pill]');
    if (!pill) return;

    const catId = pill.dataset.categoryPill;
    if (catId === state.category) return;

    state.category = catId;
    state.offset   = 0;
    updateCategoryPills(filterBar, catId);
    syncURL(state);
    loadAgents(container, state);
  });


  // ── Sort buttons ──────────────────────────────────────────────────────────
  const sortBar = container.querySelector('#browse-sort-bar');
  sortBar?.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-sort-btn]');
    if (!btn) return;

    const sortId = btn.dataset.sortBtn;
    if (sortId === state.sort) return;

    state.sort   = sortId;
    state.offset = 0;
    updateSortButtons(sortBar, sortId);
    syncURL(state);
    loadAgents(container, state);
  });


  // ── Pagination ────────────────────────────────────────────────────────────
  const prevBtn = container.querySelector('#browse-prev');
  const nextBtn = container.querySelector('#browse-next');

  prevBtn?.addEventListener('click', () => {
    if (state.offset === 0) return;
    state.offset = Math.max(0, state.offset - PAGE_LIMIT);
    loadAgents(container, state);
    // Scroll to top of grid for usability
    container.querySelector('#browse-grid')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });

  nextBtn?.addEventListener('click', () => {
    if ((state.offset + PAGE_LIMIT) >= state.total) return;
    state.offset += PAGE_LIMIT;
    loadAgents(container, state);
    container.querySelector('#browse-grid')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
}


// ─────────────────────────────────────────────────────────────────────────────
// Main Export
// ─────────────────────────────────────────────────────────────────────────────

/**
 * Render the browse/marketplace page into `container`.
 * Called by the SPA router whenever the '/browse' route is activated.
 *
 * @param {HTMLElement} container
 */
function render(container) {
  // ── 1. Read URL params → initial state ───────────────────────────────────
  const state = initState();

  // ── 2. Inject HTML ───────────────────────────────────────────────────────
  container.innerHTML = buildPageHTML(state);

  // ── 3. Wire events ───────────────────────────────────────────────────────
  wireEvents(container, state);

  // ── 4. Initial data load ─────────────────────────────────────────────────
  // Skeletons are shown immediately; cards replace them when API responds.
  // Show skeleton grid right away (before async fetch begins)
  const grid = container.querySelector('#browse-grid');
  if (grid) showSkeletonGrid(grid);

  loadAgents(container, state);
}

  window.Pages = window.Pages || {};
  window.Pages['browse'] = { render: render };
})();

    .replace(/"/g, '&quot;')

}

/**

  const existing = document.getElementById('colony-toast');
  if (existing) existing.remove();

  const toast = document.createElement('div');
  toast.id = 'colony-toast';
  toast.textContent = message;

  const color = type === 'error'
    ? 'var(--accent)'
    : 'var(--success)';

  Object.assign(toast.style, {
    position:     'fixed',
    bottom:       '32px',
    right:        '32px',
    background:   'var(--bg-elevated)',
    color,
    border:       `1px solid ${color}`,
    fontFamily:   'var(--font-body)',
    fontSize:     '14px',
    padding:      '12px 20px',
    borderRadius: 'var(--radius)',
    zIndex:       '9999',
    boxShadow:    '0 4px 24px rgba(0,0,0,0.5)',
    transition:   'opacity 0.3s ease',
    opacity:      '1',
  });

  document.body.appendChild(toast);

  setTimeout(() => {
    toast.style.opacity = '0';
    setTimeout(() => toast.remove(), 350);
  }, 3500);
}

/**
 * Handle the full deploy flow for an agent.
 * @param {string}      agentId
 * @param {HTMLElement} deployBtn
 */
async function handleDeploy(agentId, deployBtn) {
  // 1 — Auth check
  if (!Auth.isConnected()) {
    showWalletConnectModal(agentId, deployBtn);
    return;
  }

  const token = Auth.getToken();
  setButtonLoading(deployBtn, true, 'Deploying...');

  try {
    const result = await API.install(agentId, token);

    // 2 — Free / already installed
    if (result.payment_required === false) {
      showToast('Agent deployed successfully.');
      setButtonLoading(deployBtn, false, 'Deploy Agent');
      deployBtn.disabled = true;
      deployBtn.textContent = 'Deployed';
      return;
    }

    // 3 — Payment required
    if (result.status === 'payment_required') {
      setButtonLoading(deployBtn, false, 'Deploy Agent');
      showPaymentModal(agentId, result, deployBtn);
      return;
    }

    // Fallback success
    showToast('Agent deployed successfully.');
    setButtonLoading(deployBtn, false, 'Deployed');

  } catch (err) {
    setButtonLoading(deployBtn, false, 'Deploy Agent');
    showInlineError('deploy-error', err.message || 'Deployment failed. Try again.');
  }
}

/** Set a button to loading / non-loading state. */
function setButtonLoading(btn, loading, label) {
  btn.disabled = loading;
  btn.textContent = loading ? label : (btn.dataset.originalLabel || label);
  if (!loading) btn.dataset.originalLabel = label;
}

/** Show an inline error message by element ID. */
function showInlineError(id, message) {
  const el = document.getElementById(id);
  if (el) {
    el.textContent = message;
    el.style.display = 'block';
  }
}

/** Hide an inline error message by element ID. */
function hideInlineError(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = 'none';
}

/**
 * Wire up the interactive star picker inside a container.
 * @param {HTMLElement} container
 */
function initStarPicker(container) {
  const picker = container.querySelector('#star-picker');
  const input  = container.querySelector('#review-rating');
  if (!picker || !input) return;

  const stars = picker.querySelectorAll('[data-star]');

  const highlight = (upTo) => {
    stars.forEach(star => {
      const val = Number(star.dataset.star);
      star.style.color = val <= upTo ? 'var(--warning)' : 'var(--text-muted)';
    });
  };

  stars.forEach(star => {
    star.addEventListener('mouseenter', () => highlight(Number(star.dataset.star)));
    star.addEventListener('mouseleave', () => highlight(Number(input.value)));
    star.addEventListener('click', () => {
      input.value = star.dataset.star;
      highlight(Number(star.dataset.star));
    });
  });
}

/**
 * Wire up the review form submit button.
 * @param {HTMLElement} container
 * @param {string}      agentId
 */
function initReviewForm(container, agentId) {
  const btn     = container.querySelector('#submit-review-btn');
  const ratingEl = container.querySelector('#review-rating');
  const commentEl = container.querySelector('#review-comment');
  const errEl   = container.querySelector('#review-error');
  const successEl = container.querySelector('#review-success');
  if (!btn) return;

  btn.addEventListener('click', async () => {
    const rating  = Number(ratingEl?.value || 0);
    const comment = commentEl?.value?.trim() || '';

    errEl.style.display     = 'none';
    successEl.style.display = 'none';

    if (!rating || rating < 1 || rating > 5) {
      errEl.textContent    = 'Please select a rating from 1 to 5 stars.';
      errEl.style.display  = 'block';
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'Submitting...';

    try {
      const token = Auth.getToken();
      await API.addReview(agentId, { rating, comment }, token);
      successEl.textContent    = 'Review submitted. Thank you.';
      successEl.style.display  = 'block';
      btn.textContent          = 'Review Submitted';

      // Reset form
      if (ratingEl) ratingEl.value = '0';
      if (commentEl) commentEl.value = '';
      const picker = container.querySelector('#star-picker');
      if (picker) picker.querySelectorAll('[data-star]').forEach(s => s.style.color = 'var(--text-muted)');

    } catch (err) {
      btn.disabled    = false;
      btn.textContent = 'Submit Review';
      errEl.textContent   = err.message || 'Could not submit review. Please try again.';
      errEl.style.display = 'block';
    }
  });
}

/** Escape a string for safe HTML insertion. */
function esc(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

/** localStorage key for an agent's API key. */
function apiKeyStorageKey(agentId) {
  return `colony_api_key_${agentId}`;
}

    style.textContent = `
      @keyframes thinking-pulse {
        0%, 100% { opacity: 0.3; transform: translateY(0); }
        50%       { opacity: 1;   transform: translateY(-3px); }
      }
    `;
    document.head.appendChild(style);
  }

  messagesEl.appendChild(wrapper);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return wrapper;
}


// ─────────────────────────────────────────────────────────────────────────────
// Chat Interface
// ─────────────────────────────────────────────────────────────────────────────

/**
 * Render and wire up the full chat interface inside chatArea.
 * @param {HTMLElement} chatArea
 * @param {string}      agentId
 * @param {string}      agentName
 * @param {string}      apiKey
 */
function renderChatInterface(chatArea, agentId, agentName, apiKey) {
  chatArea.innerHTML = '';
  chatArea.style.cssText = `
    display:flex;flex-direction:column;height:100%;overflow:hidden;
  `;

  // Messages list
  const messagesEl = document.createElement('div');
  messagesEl.id = 'chat-messages';
  messagesEl.style.cssText = `
    flex:1;overflow-y:auto;padding:24px 20px;scroll-behavior:smooth;
  `;

  // Input row
  const inputRow = document.createElement('div');
  inputRow.style.cssText = `
    display:flex;gap:10px;padding:14px 20px;
    border-top:1px solid var(--border);
    background:var(--bg-card);
    flex-shrink:0;
  `;

  const textInput = document.createElement('textarea');
  textInput.id          = 'chat-input';
  textInput.placeholder = 'Type a message...';
  textInput.rows        = 1;
  textInput.style.cssText = `
    flex:1;resize:none;background:var(--bg-elevated);border:1px solid var(--border);
    border-radius:var(--radius);color:var(--text);font-family:var(--font-body);
    font-size:14px;padding:10px 14px;line-height:1.5;outline:none;
    transition:border-color var(--t-fast);max-height:120px;overflow-y:auto;
  `;

  // Auto-grow textarea
  textInput.addEventListener('input', () => {
    textInput.style.height = 'auto';
    textInput.style.height = Math.min(textInput.scrollHeight, 120) + 'px';
  });

  textInput.addEventListener('focus', () => {
    textInput.style.borderColor = 'var(--text-muted)';
  });
  textInput.addEventListener('blur', () => {
    textInput.style.borderColor = 'var(--border)';
  });

  const sendBtn = document.createElement('button');
  sendBtn.className  = 'btn-primary';
  sendBtn.textContent = 'Send';
  sendBtn.style.cssText = `
    align-self:flex-end;padding:10px 20px;flex-shrink:0;font-size:14px;
  `;

  inputRow.appendChild(textInput);
  inputRow.appendChild(sendBtn);

  chatArea.appendChild(messagesEl);
  chatArea.appendChild(inputRow);

  // In-memory conversation history
  /** @type {Array<{role:'user'|'assistant', content:string}>} */
  const history = [];
  let isWaiting = false;

  const setWaiting = (waiting) => {
    isWaiting       = waiting;
    textInput.disabled = waiting;
    sendBtn.disabled   = waiting;
    sendBtn.textContent = waiting ? '...' : 'Send';
    if (!waiting) textInput.focus();
  };

  const sendMessage = async () => {
    if (isWaiting) return;

    const message = textInput.value.trim();
    if (!message) return;

    // Reset input
    textInput.value = '';
    textInput.style.height = 'auto';

    // Add user message to UI
    appendMessage(messagesEl, 'user', message, agentName);

    // Add to history
    history.push({ role: 'user', content: message });

    // Show thinking
    setWaiting(true);
    const thinkingEl = appendThinking(messagesEl, agentName);

    try {
      const token = Auth.getToken();
      const res   = await API.chat(agentId, message, history.slice(0, -1), apiKey, token);

      thinkingEl.remove();

      const reply = res.reply || res.message || res.content || '';
      appendMessage(messagesEl, 'assistant', reply, agentName);
      history.push({ role: 'assistant', content: reply });

    } catch (err) {
      thinkingEl.remove();
      appendMessage(
        messagesEl,
        'system',
        `Error: ${err.message || 'Could not get a response. Please try again.'}`,
        agentName
      );
    } finally {
      setWaiting(false);
    }
  };

  sendBtn.addEventListener('click', sendMessage);
  textInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Focus input
  setTimeout(() => textInput.focus(), 50);
}

// Main Render
// ─────────────────────────────────────────────────────────────────────────────

/**
 * Render the full chat page.

async function render(container, agentId) {
  // Full-height layout — override container
  container.style.cssText = `

    <div id="chat-area" style="flex:1;overflow:hidden;display:flex;align-items:center;

        border-top-color:var(--text);border-radius:50%;animation:spin 0.7s linear infinite;"></div>

  // Inject spin animation once

    style.id = 'spin-keyframes';
    style.textContent = `@keyframes spin { to { transform: rotate(360deg); } }`;
    document.head.appendChild(style);
  }

  // ── Fetch agent ─────────────────────────────────────────────────────────────
  let agent;
  try {
    agent = await API.agent(agentId);
  } catch (err) {
    container.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;
        justify-content:center;height:100%;padding:40px;text-align:center;">
        <div style="font-size:14px;color:var(--text-muted);margin-bottom:16px;">
          Failed to load agent.
        </div>
        <div style="font-size:13px;color:var(--accent);margin-bottom:20px;">${esc(err.message || '')}</div>
        <button class="btn-secondary" onclick="history.back()">Go Back</button>
      </div>
    `;
    return;
  }

  const agentName = agent.name || 'Agent';
  const model     = agent.model || '';

  // ── Render top bar ──────────────────────────────────────────────────────────
  const topbar = container.querySelector('#chat-topbar');
  topbar.innerHTML = `
    <button id="back-btn" style="
      background:none;border:1px solid var(--border);border-radius:var(--radius);
      color:var(--text-secondary);font-family:var(--font-body);font-size:13px;
      padding:7px 14px;cursor:pointer;transition:border-color var(--t-fast),color var(--t-fast);
      flex-shrink:0;
    ">&#8592; Back</button>

    <span style="font-family:var(--font-headline);font-size:16px;
      color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      flex:1;min-width:0;">
      ${esc(agentName)}
    </span>

    ${model ? `
      <code style="font-family:var(--font-code);font-size:11px;
        background:var(--bg-elevated);border:1px solid var(--border);
        border-radius:var(--radius);padding:4px 10px;
        color:var(--text-secondary);white-space:nowrap;flex-shrink:0;">
        ${esc(model)}
      </code>
    ` : ''}
  `;

  topbar.querySelector('#back-btn').addEventListener('click', () => {
    Router.navigate(`/agents/${agentId}`);
  });

  topbar.querySelector('#back-btn').addEventListener('mouseenter', (e) => {
    e.currentTarget.style.borderColor = 'var(--text-muted)';
    e.currentTarget.style.color       = 'var(--text)';
  });
  topbar.querySelector('#back-btn').addEventListener('mouseleave', (e) => {
    e.currentTarget.style.borderColor = 'var(--border)';
    e.currentTarget.style.color       = 'var(--text-secondary)';
  });

  // ── Check for stored API key ─────────────────────────────────────────────────
  const chatArea  = container.querySelector('#chat-area');
  chatArea.style.cssText = 'flex:1;overflow:hidden;';

  const storedKey = localStorage.getItem(apiKeyStorageKey(agentId));

  if (!storedKey) {
    // Show API key setup panel
    renderApiKeyPanel(chatArea, agentId, agentName, (savedKey) => {
      renderChatInterface(chatArea, agentId, agentName, savedKey);
    });
  } else {
    // Go straight to chat
    renderChatInterface(chatArea, agentId, agentName, storedKey);
  }
}

  window.Pages = window.Pages || {};
  window.Pages['agent-chat'] = { render: render };
})();

/** Escape a string for safe HTML insertion. */
function esc(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

/**
 * Show or hide a field error message.
 * Error elements follow the id pattern: `{fieldId}-error`
 * @param {string}  fieldId
 * @param {string}  [message]  Pass empty/null to clear
 */
function setFieldError(fieldId, message) {
  const errEl = document.getElementById(`${fieldId}-error`);
  if (!errEl) return;
  errEl.textContent    = message || '';
  errEl.style.display  = message ? 'block' : 'none';

  const fieldEl = document.getElementById(fieldId);
  if (fieldEl) {
    fieldEl.style.borderColor = message ? 'var(--accent)' : 'var(--border)';
  }
}

/** Clear all field errors. */
function clearAllErrors() {
  Object.keys(REQUIRED_FIELDS).forEach(id => setFieldError(id, ''));
  const globalErr = document.getElementById('form-global-error');
  if (globalErr) globalErr.style.display = 'none';
}

/** Build a <select> element's inner HTML from an options array. */
function selectOptions(options, placeholder) {
  const placeholderOpt = `<option value="" disabled selected>${esc(placeholder)}</option>`;
  const opts = options.map(o => `<option value="${esc(o.value)}">${esc(o.label)}</option>`).join('');
  return placeholderOpt + opts;
}

// ─────────────────────────────────────────────────────────────────────────────
// Validation
// ─────────────────────────────────────────────────────────────────────────────

/**
 * Validate all required fields.
 * Shows inline errors and returns false if any fail.
 * @param {HTMLElement} form
 * @returns {boolean}
 */
function validateForm(form) {
  let valid = true;
  clearAllErrors();

  Object.entries(REQUIRED_FIELDS).forEach(([id, label]) => {
    const el = document.getElementById(id);
    if (!el) return;
    const val = el.value?.trim();
    if (!val) {
      setFieldError(id, `${label} is required.`);
      valid = false;
    }
  });

  // Pricing: if paid, price must be > 0
  const pricingType = document.getElementById('field-pricing-type')?.value;
  const priceEl     = document.getElementById('field-price');
  if (pricingType && pricingType !== 'free') {
    const price = parseFloat(priceEl?.value || '0');
    if (!price || price <= 0) {
      setFieldError('field-price', 'Enter a price greater than 0 for paid agents.');
      valid = false;
    }
  }

  return valid;
}


// ─────────────────────────────────────────────────────────────────────────────
// Form Wiring
// ─────────────────────────────────────────────────────────────────────────────

/** Wire up all interactive behaviors after form HTML is in the DOM. */
function initFormBehaviors() {
  // Char counter for short description
  const descInput  = document.getElementById('field-description');
  const descCount  = document.getElementById('desc-count');
  if (descInput && descCount) {
    descInput.addEventListener('input', () => {
      descCount.textContent = descInput.value.length;
      descCount.style.color = descInput.value.length > 180 ? 'var(--warning)' : 'var(--text-muted)';
    });
  }

  // Enable/disable price field based on pricing type
  const pricingSelect = document.getElementById('field-pricing-type');
  const priceInput    = document.getElementById('field-price');
  if (pricingSelect && priceInput) {
    const update = () => {
      const isFree = pricingSelect.value === 'free' || !pricingSelect.value;
      priceInput.disabled          = isFree;
      priceInput.style.opacity     = isFree ? '0.4' : '1';
      priceInput.style.cursor      = isFree ? 'not-allowed' : 'text';
      if (isFree) {
        priceInput.value = '';
        setFieldError('field-price', '');
      }
    };
    pricingSelect.addEventListener('change', update);
    update(); // run once on mount
  }

  // Clear error on input focus
  Object.keys(REQUIRED_FIELDS).forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      el.addEventListener('input', () => setFieldError(id, ''));
      el.addEventListener('change', () => setFieldError(id, ''));
    }
  });
}


// ─────────────────────────────────────────────────────────────────────────────
// Submit Handler
// ─────────────────────────────────────────────────────────────────────────────

async function handleSubmit() {
  if (!validateForm()) return;

  const submitBtn = document.getElementById('publish-btn');
  const globalErr = document.getElementById('form-global-error');
  globalErr.style.display = 'none';

  submitBtn.disabled    = true;
  submitBtn.textContent = 'Publishing...';

  // Collect form data
  const name         = document.getElementById('field-name').value.trim();
  const description  = document.getElementById('field-description').value.trim();
  const longDesc     = document.getElementById('field-long-description').value.trim();
  const category     = document.getElementById('field-category').value;
  const model        = document.getElementById('field-model').value;
  const systemPrompt = document.getElementById('field-system-prompt').value.trim();
  const pricingType  = document.getElementById('field-pricing-type').value;
  const priceRaw     = document.getElementById('field-price').value;
  const tagsRaw      = document.getElementById('field-tags').value;

  const price = pricingType === 'free' ? 0 : (parseFloat(priceRaw) || 0);
  const tags  = tagsRaw
    ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean)
    : [];

  const payload = {
    name,
    description,
    ...(longDesc     ? { long_description: longDesc }       : {}),
    category,
    model,
    system_prompt: systemPrompt,
    pricing_type:  pricingType,
    price,
    ...(tags.length  ? { tags }                              : {}),
  };

  try {
    const token  = Auth.getToken();
    const result = await API.createAgent(payload, token);

    // Navigate to the new agent's detail page
    const newId = result.id || result.agent?.id;
    if (newId) {
      Router.navigate(`/agents/${newId}`);
    } else {
      Router.navigate('/browse');
    }

  } catch (err) {
    submitBtn.disabled    = false;
    submitBtn.textContent = 'Publish Agent';
    globalErr.textContent   = err.message || 'Failed to publish agent. Please try again.';
    globalErr.style.display = 'block';
    globalErr.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}


// ─────────────────────────────────────────────────────────────────────────────
// Main Render
// ─────────────────────────────────────────────────────────────────────────────

/**
 * Render the Create Agent page.
 * @param {HTMLElement} container
 */
function render(container) {
  // Auth gate
  if (!Auth.isConnected()) {
    renderAuthGate(container);
    return;
  }

  container.innerHTML = `
    <div style="max-width:720px;margin:0 auto;padding:48px var(--pad-x) 100px;">

      <!-- Header -->
      <div style="margin-bottom:40px;">
        <h1 style="font-family:var(--font-headline);font-size:clamp(28px,4vw,44px);
          color:var(--text);margin-bottom:8px;line-height:1.1;">
          Publish an Agent
        </h1>
        <p style="color:var(--text-secondary);font-size:15px;line-height:1.65;">
          Fill out the form below. Your agent goes live immediately after publishing.
        </p>
      </div>

      <!-- Form -->
      <form id="create-form" novalidate>

        ${buildFormHTML()}

        <!-- Global error -->
        <div id="form-global-error" style="display:none;color:var(--accent);font-size:13px;

  window.Pages = window.Pages || {};

/* ======== dashboard ======== */

// ═══ PAGE: dashboard ═══
(function() {
/**
 * Colony HQ — Creator Dashboard
 *
 * Sections:
 *   - Wallet address + Disconnect button
 *   - 4 stat cards (earnings, agents, installs, reviews) from API.earnings()
 *   - My Agents table from API.myAgents() with skeleton loading
 *
 * Redirects to / if not authenticated.
 *
 * @param {HTMLElement} container
 */



// ─────────────────────────────────────────────────────────────────────────────
// Utilities
// ─────────────────────────────────────────────────────────────────────────────

/** Escape a string for safe HTML insertion. */
function esc(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

/** Format a number with locale commas. */
function fmt(n) {
  return Number(n).toLocaleString('en-US');
}

/** Format a USD price string. */
function fmtUSD(n) {
  const num = Number(n);
  if (!Number.isFinite(num)) return '—';
  return '$' + num.toFixed(2);
}


// ─────────────────────────────────────────────────────────────────────────────
// Skeleton Helpers
// ─────────────────────────────────────────────────────────────────────────────

/** Render N skeleton table rows. */
function skeletonRows(n) {
  return Array.from({ length: n }, () => `
    <tr>
      <td style="padding:16px 12px;">
        <div style="display:flex;flex-direction:column;gap:6px;">
          <div class="skeleton skeleton-text" style="width:140px;"></div>
          <div class="skeleton skeleton-text" style="width:90px;height:11px;"></div>
        </div>
      </td>
      <td style="padding:16px 12px;"><div class="skeleton skeleton-text" style="width:60px;"></div></td>
      <td style="padding:16px 12px;"><div class="skeleton skeleton-text" style="width:40px;"></div></td>
      <td style="padding:16px 12px;"><div class="skeleton skeleton-text" style="width:40px;"></div></td>
      <td style="padding:16px 12px;"><div class="skeleton skeleton-text" style="width:60px;"></div></td>
      <td style="padding:16px 12px;"><div class="skeleton skeleton-text" style="width:60px;"></div></td>
    </tr>
  `).join('');
}

/** Render N skeleton stat cards. */
function skeletonStatCards() {
  return Array.from({ length: 4 }, () => `
    <div style="background:var(--bg-card);border:1px solid var(--border);
      border-radius:var(--radius);padding:24px;">
      <div class="skeleton skeleton-text" style="width:80px;height:11px;margin-bottom:10px;"></div>
      <div class="skeleton skeleton-title" style="width:100px;height:28px;"></div>
    </div>
  `).join('');
}


// ─────────────────────────────────────────────────────────────────────────────
// Stat Card
// ─────────────────────────────────────────────────────────────────────────────

/**
 * Build a stat card HTML string.
 * @param {{ label: string, value: string, accent?: boolean }} opts
 */
function statCardHTML({ label, value, accent }) {
  return `
    <div style="background:var(--bg-card);border:1px solid var(--border);
      border-radius:var(--radius);padding:24px;">
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.08em;
        color:var(--text-muted);margin-bottom:8px;">${esc(label)}</div>
      <div style="font-family:var(--font-code);font-size:24px;font-weight:700;
        color:${accent ? 'var(--success)' : 'var(--text)'};">${esc(value)}</div>
    </div>
  `;
}


// ─────────────────────────────────────────────────────────────────────────────
// Agent Table Row
// ─────────────────────────────────────────────────────────────────────────────

/**
 * Build a table row for a single agent.
 * @param {Object} agent
 * @returns {HTMLTableRowElement}
 */
function buildAgentRow(agent) {
  const isActive   = (agent.status || 'active').toLowerCase() !== 'archived';
  const rating     = agent.rating != null ? `★ ${Number(agent.rating).toFixed(1)}` : '—';
  const revenue    = agent.revenue != null ? fmtUSD(agent.revenue) : '—';
  const installs   = agent.installs != null ? fmt(agent.installs) : '0';

  const isFree     = !agent.price || Number(agent.price) === 0 || agent.pricing_type === 'free';
  const priceLabel = isFree
    ? '<span style="color:var(--success);font-size:13px;">Free</span>'
    : `<span style="font-size:13px;">${fmtUSD(agent.price)}</span>`;

  const statusBadge = isActive
    ? `<span style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;
        font-weight:600;color:#22c55e;background:rgba(34,197,94,0.12);
        border:1px solid rgba(34,197,94,0.25);border-radius:2px;padding:3px 8px;">
        Active
       </span>`
    : `<span style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;
        font-weight:600;color:var(--text-muted);background:rgba(255,255,255,0.05);
        border:1px solid var(--border);border-radius:2px;padding:3px 8px;">
        Archived
       </span>`;

  const tr = document.createElement('tr');
  tr.style.cssText = `cursor:pointer;transition:background var(--t-fast);`;
  tr.dataset.agentId = agent.id;

  tr.innerHTML = `
    <td style="padding:16px 12px;">
      <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px;
        white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;">
        ${esc(agent.name)}
      </div>
      ${agent.category
        ? `<div style="font-size:11px;text-transform:uppercase;letter-spacing:0.05em;
            color:var(--text-muted);">${esc(agent.category)}</div>`
        : ''}
    </td>
    <td style="padding:16px 12px;">${statusBadge}</td>
    <td style="padding:16px 12px;font-family:var(--font-code);font-size:14px;color:var(--text-secondary);">
      ${esc(installs)}
    </td>
    <td style="padding:16px 12px;font-size:14px;color:var(--warning);">${esc(rating)}</td>
    <td style="padding:16px 12px;">${priceLabel}</td>
    <td style="padding:16px 12px;font-family:var(--font-code);font-size:14px;
      color:var(--text-secondary);">${revenue}</td>
  `;

  tr.addEventListener('mouseenter', () => {
    tr.style.background = 'var(--bg-elevated)';
  });
  tr.addEventListener('mouseleave', () => {
    tr.style.background = '';
  });
  tr.addEventListener('click', () => {
    Router.navigate('/agents/' + agent.id);
  });

  return tr;
}


// ─────────────────────────────────────────────────────────────────────────────
// Main Render
// ─────────────────────────────────────────────────────────────────────────────

/**
 * Render the Dashboard page.
 * @param {HTMLElement} container
 */
async function render(container) {
  // Auth guard
  if (!Auth.isConnected()) {
    Router.navigate('/');
    return;
  }

  const token  = Auth.getToken();
  const wallet = Auth.getWallet() || '';

  // ── Initial shell ───────────────────────────────────────────────────────────
  container.innerHTML = `
    <div style="max-width:var(--max-width);margin:0 auto;padding:48px var(--pad-x) 100px;">

      <!-- Header row -->
      <div style="display:flex;align-items:center;justify-content:space-between;
        flex-wrap:wrap;gap:16px;margin-bottom:40px;">
        <h1 style="font-family:var(--font-headline);font-size:clamp(28px,4vw,48px);
          color:var(--text);line-height:1;">
          DASHBOARD
        </h1>
        <div style="display:flex;align-items:center;gap:12px;">
          <code style="font-family:var(--font-code);font-size:13px;
            background:var(--bg-elevated);border:1px solid var(--border);
            border-radius:var(--radius);padding:6px 14px;color:var(--text-secondary);">
            ${esc(wallet ? truncateAddress(wallet) : '—')}
          </code>
          <button id="disconnect-btn" class="btn-secondary"
            style="font-size:13px;padding:7px 16px;">
            Disconnect

        </div>
      </div>

      <!-- Stats grid (skeleton until data arrives) -->
      <div id="stats-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:48px;">
        ${skeletonStatCards()}
      </div>

      <!-- My Agents table -->
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;
          margin-bottom:20px;flex-wrap:wrap;gap:12px;">
          <h2 style="font-family:var(--font-headline);font-size:22px;color:var(--text);">
            My Agents
          </h2>
          <button id="create-agent-btn" class="btn-primary"
            style="font-size:13px;padding:8px 18px;">

          </button>
        </div>

        <div id="agents-table-wrapper" style="background:var(--bg-card);

            <thead>
              <tr style="border-bottom:1px solid var(--border);">
                ${['Name','Status','Installs','Rating','Price','Revenue'].map(h => `
                  <th style="text-align:left;padding:12px 12px;font-size:11px;
                    text-transform:uppercase;letter-spacing:0.08em;
                    color:var(--text-muted);font-weight:600;">${h}</th>

              </tr>
            </thead>
            <tbody id="agents-tbody">
              ${skeletonRows(4)}
            </tbody>

        <div id="agents-empty" style="display:none;padding:64px 40px;text-align:center;
          background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);">
          <div style="font-size:14px;color:var(--text-secondary);margin-bottom:20px;">

          </div>
          <button id="empty-create-btn" class="btn-primary" style="padding:11px 28px;">
            Publish an Agent

        </div>

    </div>
  `;

  // ── Disconnect ──────────────────────────────────────────────────────────────
  container.querySelector('#disconnect-btn').addEventListener('click', () => {

  // ── Publish Agent buttons ───────────────────────────────────────────────────
  container.querySelector('#create-agent-btn').addEventListener('click', () => {
    Router.navigate('/create');
  });

  // ── Fetch data in parallel ──────────────────────────────────────────────────
  const [earningsResult, agentsResult] = await Promise.allSettled([
    API.earnings(token),
    API.myAgents(token),
  ]);

  // ── Render stats ────────────────────────────────────────────────────────────
  const statsGrid = container.querySelector('#stats-grid');

  if (earningsResult.status === 'fulfilled') {
    const e = earningsResult.value;

    const totalEarnings   = e.total_earnings   != null ? fmtUSD(e.total_earnings)         : '—';
    const agentCount      = e.agent_count       != null ? fmt(e.agent_count)               : '—';
    const totalInstalls   = e.total_installs    != null ? fmt(e.total_installs)            : '—';
    const totalReviews    = e.total_reviews     != null ? fmt(e.total_reviews)             : '—';

    statsGrid.innerHTML = [
      { label: 'Total Earnings',    value: totalEarnings,  accent: true  },
      { label: 'Published Agents',  value: agentCount,     accent: false },

    ].map(statCardHTML).join('');

  } else {
    // Fallback skeleton text on error
    statsGrid.innerHTML = `
      <div style="grid-column:1/-1;padding:16px;font-size:13px;color:var(--text-muted);">
